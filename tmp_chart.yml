    app: sdp
    chart: sdp-0.2.0
    release: test
    heritage: Helm
    system: sdp
    telescope: SKA-mid
    component: processing-controller
    subsystem: execution-control
    function: PB-execution
    domain: science-data-processing
    intent: production
spec:
  replicas: 1
  selector:
    matchLabels:
      component: processing-controller
      subsystem: execution-control
  serviceName: sdp-proccontrol
  template:
    metadata:
      labels:        
        app: sdp
        chart: sdp-0.2.0
        release: test
        heritage: Helm
        system: sdp
        telescope: SKA-mid
        component: processing-controller
        subsystem: execution-control
        function: PB-execution
        domain: science-data-processing
        intent: production
    spec:
      initContainers:
      - name: wait-for-etcd
        image: quay.io/coreos/etcd:v3.3.25
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c", "while ( ! etcdctl endpoint health ); do sleep 1; done"]
        env:
        - name: ETCDCTL_ENDPOINTS
          value: "http://sdp-etcd-client.integration.svc.cluster.local:2379"
        - name: ETCDCTL_API
          value: "3"
      containers:
      - name: proccontrol
        image: nexus.engageska-portugal.pt/sdp-prototype/ska-sdp-proccontrol:0.7.1
        imagePullPolicy: IfNotPresent
        env:
        - name: SDP_CONFIG_HOST
          value: sdp-etcd-client.integration.svc.cluster.local
        - name: SDP_HELM_NAMESPACE
          value: "integration-sdp"
        - name: SDP_WORKFLOWS_URL
          value: "https://gitlab.com/ska-telescope/sdp-workflows-procfunc/-/raw/master/workflows.json"
        - name: SDP_WORKFLOWS_REFRESH
          value: "300"
