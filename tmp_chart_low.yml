# run once Job for loading Device Server config
apiVersion: batch/v1
kind: Job
metadata:
  name: mccs-configuration-test
  namespace: integration
  labels:
    app: ska-low-mccs
    component: configurator
    function: deployment
    intent: enabling
    domain: self-configuration
  annotations:
    app.gitlab.com/app: CI_PROJECT_PATH_SLUG
    app.gitlab.com/env: CI_ENVIRONMENT_SLUG
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      initContainers:
      - name: check-databaseds-ready
        image: nexus.engageska-portugal.pt/ska-docker/tango-dsconfig:1.5.0
        imagePullPolicy: IfNotPresent
        command:
          - retry
          - --max=10
          - --
          - /usr/local/bin/wait-for-it.sh
          - databaseds-tango-base-test:10000
          - --timeout=60
          - --strict
          - --
          - echo databaseds-tango-base-test:10000 ready
      containers:
      - name: dsconfig
        image: "nexus.engageska-portugal.pt/ska-docker/tango-dsconfig:1.5.0"
        imagePullPolicy: IfNotPresent
        command: # exit code 2 is CONFIG_APPLIED - https://github.com/MaxIV-KitsControls/lib-maxiv-dsconfig/blob/master/dsconfig/utils.py#L11 !!!! this should not be an error !!!!
          - sh
          - data/bootstrap.sh
        env:
        - name: TANGO_HOST
          value: databaseds-tango-base-test:10000
        volumeMounts:
          - name: configuration
            mountPath: data
            readOnly: true
      volumes:
        - name: configuration
          configMap:
            name: mccs-configuration-test
      restartPolicy: Never
