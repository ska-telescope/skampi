kind: ConfigMap
metadata:
  name: webjive-package-build-webjive-test
  namespace: integration
data:
  build.sh: |
    #!/bin/sh
    set +e
    cd /home/node/app
    sed -i 's/"basename" : ""/"basename": "\/integration"/' /home/node/app/src/config.json
    sed -i 's/"name":/"homepage": "\/integration", "name":/' /home/node/app/package.json
    npm install && npm run build
