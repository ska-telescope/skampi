spec:
  selector:
    matchLabels:
      app: ska-docker
      component: tango-rest
      function: tango-http-interface
      domain: tango-configuration
      intent: enabling
  replicas: 3
  template:
    metadata:
      labels:
        app: ska-docker
        component: tango-rest
        function: tango-http-interface
        domain: tango-configuration
        intent: enabling
      annotations:
        app.gitlab.com/app: CI_PROJECT_PATH_SLUG
        app.gitlab.com/env: CI_ENVIRONMENT_SLUG
    spec:
      initContainers:
      - name: check-dependencies-0
        image: "nexus.engageska-portugal.pt/ska-docker/tango-rest:1.14.1"
        imagePullPolicy: IfNotPresent
        command:
          - retry
          - --max=10
          - --
          - tango_admin
          - --check-device
          - sys/database/2
        env:
        - name: TANGO_HOST
          value: databaseds-tango-base-test:10000
      - name: init-0
        image: "nexus.engageska-portugal.pt/ska-docker/tango-rest:1.14.1"
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
        args:
          - "-c"
          - /usr/local/bin/tango_register_device.sh TangoRestServer/$(hostname) TangoRestServer $(hostname)/rest/0
        env:
        - name: TANGO_HOST
          value: databaseds-tango-base-test:10000
      - name: init-1
        image: "nexus.engageska-portugal.pt/ska-docker/tango-rest:1.14.1"
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
        args:
          - "-c"
          - /usr/local/bin/tango_admin --add-property $(hostname)/rest/0 TANGO_DB tango://databaseds-tango-base-test:10000/sys/database/2
        env:
        - name: TANGO_HOST
          value: databaseds-tango-base-test:10000
      - name: init-2
        image: "nexus.engageska-portugal.pt/ska-docker/tango-rest:1.14.1"
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
        args:
          - "-c"
          - /usr/local/bin/tango_admin --add-property $(hostname)/rest/0 TOMCAT_PORT 8080
        env:
        - name: TANGO_HOST
          value: databaseds-tango-base-test:10000
      - name: init-3
        image: "nexus.engageska-portugal.pt/ska-docker/tango-rest:1.14.1"
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
        args:
          - "-c"
          - /usr/local/bin/tango_admin --add-property $(hostname)/rest/0 TOMCAT_AUTH_METHOD plain
        env:
        - name: TANGO_HOST
          value: databaseds-tango-base-test:10000
      containers:
      - name: tango-rest
        image: "nexus.engageska-portugal.pt/ska-docker/tango-rest:1.14.1"
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
        args:
          - "-c"
          - /usr/bin/java -jar $JAVA_OPTS /usr/local/lib/tango/mtangorest.jar $(hostname)
        env:
        - name: TANGO_HOST
          value: "databaseds-tango-base-test:10000"
        - name: JAVA_OPTS
