# Source: mvp-low/charts/webjive/templates/webjive.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: webjive-webjive-test
  namespace: integration
  labels:
    app: webjive-webjive-test
    chart: webjive-1.0.10
    release: test
    heritage: Helm
spec:
  selector:
    matchLabels:
      app: webjive-webjive-test
  serviceName: webjive-webjive-test
  replicas: 1
  template:
    metadata:
      labels:
        app: webjive-webjive-test
        chart: webjive-1.0.10
        release: test
        heritage: Helm
    spec:
      initContainers:
      - name: rebuild-npm
        image: "nexus.engageska-portugal.pt/ska-telescope/webjive-node:1.0.6-develop-313"
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "sh /home/node/app/build.sh"]
        volumeMounts:
        - name: package-build
          mountPath: /home/node/app/build.sh
          subPath: build.sh
        - mountPath: /home/node/app/build
          name: cache-volume
        resources:
          limits:
            cpu: 1000m
            memory: 2048Mi
          requests:
            cpu: 400m
            memory: 256Mi
      containers:
      - name: webjive
        image: "nexus.engageska-portugal.pt/ska-telescope/webjive:1.0.6-develop-313"
        imagePullPolicy: IfNotPresent
        ports:
        - name: webjive-http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: cache-volume
        - mountPath: /usr/share/nginx/html/integration
          name: cache-volume
        resources:
          limits:
            cpu: 1000m
            memory: 2048Mi
          requests:
            cpu: 400m
            memory: 256Mi
      volumes:
      - name: package-build
        configMap:
          name: webjive-package-build-webjive-test
      - name: cache-volume
        emptyDir: {}
