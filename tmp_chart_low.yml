            value: "1"
          - name: TANGO_HOST
            value: databaseds-tango-base-test:10000
        ports:
        - name: tangogql-tcp
          containerPort: 5004
          protocol: TCP
        resources:
          limits:
            cpu: 800m
            memory: 256Mi
          requests:
            cpu: 400m
            memory: 128Mi

      volumes:
      - name: tangogql-logs
        persistentVolumeClaim:
          claimName: tangogql-webjive-test
