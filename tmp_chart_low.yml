apiVersion: apps/v1
kind: Deployment
metadata:
  name: oet-jupyter-test
  namespace: integration
  labels:    
    app: oet
    chart: oet-scripts-0.3.1
    release: test
    heritage: Helm
    system: TM-mid
    subsystem: oet
    telescope: SKA-mid
    component: jupyter
    function: interactive-script-execution
    domain: operations
    intent: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oet
      component: jupyter
  template:
    metadata:
      labels:        
        app: oet
        chart: oet-scripts-0.3.1
        release: test
        heritage: Helm
        system: TM-mid
        subsystem: oet
        telescope: SKA-mid
        component: jupyter
        function: interactive-script-execution
        domain: operations
        intent: production
    spec:
      volumes:
        - name: configuration
          configMap:
            name: oet-jupyter-test
            items:
            - key: environment
              path: environment
            - key: venv.sh
              path: venv.sh
            - key: jupyter_notebook_config.json
              path: jupyter_notebook_config.json
        - name: workdir
          emptyDir: {}
      initContainers:
      - name: check-databaseds-ready
        image: "nexus.engageska-portugal.pt/ska-telescope/oet-scripts-jupyter:0.3.0"
        command:
          - /usr/local/bin/wait-for-it.sh
          - "databaseds-tango-base-test:10000"
          - --timeout=30
          - --strict
          - --
          - echo databaseds ready
      containers:
      - name: oet-jupyter
        image: "nexus.engageska-portugal.pt/ska-telescope/oet-scripts-jupyter:0.3.0"
        imagePullPolicy: IfNotPresent
        ports:
          - name: oet-jupyter
            containerPort: 8888
        env:
          - name: TANGO_HOST
            value: databaseds-tango-base-test:10000
          - name: SHELL
            value: /bin/bash
          - name: OET_REST_URI
            value: http://oet-rest-test:5000/api/v1.0/procedures
          - name: SKUID_URL
            value: "skuid-skuid-integration-test.integration.svc.cluster.local:9870"
        volumeMounts:
          - name: workdir
            mountPath: /home/tango/.jupyter
          - name: configuration
            mountPath: /etc/environment
            subPath: environment
          - name: configuration
            mountPath: /etc/profile.d/venv.sh
            subPath: venv.sh
          - name: configuration
            mountPath: /home/tango/.jupyter/jupyter_notebook_config.json
            subPath: jupyter_notebook_config.json
        resources:
          limits:
            cpu: 1000m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          tcpSocket:
            port: 8888
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 8888
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
          successThreshold: 1
          failureThreshold: 3
      restartPolicy: Always
